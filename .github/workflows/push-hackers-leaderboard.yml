name: Sync Hackers Leaderboard to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'apps/hackers-leaderboard/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Install huggingface_hub
        run: |
          curl -LsSf https://hf.co/cli/install.sh -o install.sh
          echo "Verify the script content and checksum before executing in production"
          # TODO: Add checksum verification: echo "<expected-sha256> install.sh" | sha256sum -c -
          bash install.sh

      - name: Upload hackers leaderboard to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: hf upload hf-skills/hacker_leaderboard apps/hackers-leaderboard . --repo-type=space

