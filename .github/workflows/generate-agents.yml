name: Validate generated agent/plugin artifacts

on:
  pull_request:
    paths:
      - "scripts/AGENTS_TEMPLATE.md"
      - "scripts/generate_agents.py"
      - "scripts/generate_cursor_plugin.py"
      - "scripts/plugin_versions.py"
      - "scripts/publish.sh"
      - "skills/**"
      - "agentsmd/AGENTS.md"
      - "README.md"
      - ".claude-plugin/marketplace.json"
      - ".claude-plugin/plugin.json"
      - ".cursor-plugin/marketplace.json"
      - "gemini-extension.json"
      - ".cursor-plugin/plugin.json"
      - ".mcp.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Ensure generated files are up to date
        run: ./scripts/publish.sh --check

      - name: Ensure version bumped for published content changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: uv run scripts/plugin_versions.py check-bump "$BASE_SHA"

      - name: Ensure skills index artifact builds
        run: |
          uv run scripts/build_skills_index.py \
            --repo-root . \
            --out-dir out/skills-index/latest \
            --branch main

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Validate SKILL.md format
        run: |
          uv run python -c "
          import glob, sys
          from pathlib import Path
          sys.path.insert(0, 'scripts')
          from frontmatter_utils import parse_frontmatter
          for f in glob.glob('skills/*/SKILL.md'):
              text = open(f, encoding='utf-8').read()
              try:
                  meta = parse_frontmatter(text)
                  assert isinstance(meta, dict), f'{f}: metadata is not a dict'
                  # Check required fields
                  name = meta.get('TERMUX_PKG_NAME') or meta.get('name')
                  desc = meta.get('TERMUX_PKG_DESCRIPTION') or meta.get('description')
                  assert name, f'{f}: missing name/TERMUX_PKG_NAME'
                  assert desc, f'{f}: missing description/TERMUX_PKG_DESCRIPTION'
              except Exception as e:
                  print(f'ERROR: {e}', file=sys.stderr)
                  sys.exit(1)
          print('All SKILL.md files are valid.')
          "
